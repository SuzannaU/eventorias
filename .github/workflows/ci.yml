name: CI Pull Request

on:
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-quality:
    name: Build, Test & Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones disabled for better relevancy of Sonar analysis

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create dummy google-services.json
        run: |
          if [ ! -f app/google-services.json ]; then
            echo '{"project_info":{"project_number":"0","project_id":"dummy","storage_bucket":"dummy"},"client":[{"client_info":{"mobilesdk_app_id":"0","android_client_info":{"package_name":"parcours.android.eventorias"}},"api_key":[{"current_key":"dummy"}],"services":{"appinvite_service":{"status":1}}}]}' > app/google-services.json
          fi

      - name: Build and Run Unit Tests
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew testDebugUnitTest

      - name: Run Android Instrumented Tests & Generate Report
        uses: reactivecircus/android-emulator-runner@v2
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          api-level: 31
          arch: x86_64
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: ./gradlew connectedDebugAndroidTest jacocoTestReport

      - name: SonarCloud Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar